<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>导师双选随机分配</title>

<style>
body {
    font-family: Arial;
    max-width: 900px;
    margin: auto;
    padding: 20px;
}
textarea {
    width: 100%;
    height: 180px;
    margin-bottom: 20px;
    font-size: 14px;
}
button {
    padding: 10px 20px;
    font-size: 16px;
}
.result {
    margin-top: 20px;
    white-space: pre-wrap;
    background: #f5f5f5;
    padding: 10px;
}
</style>

</head>
<body>

<h2>导师输入（格式：姓名 空格 数量）</h2>
<textarea id="teachers" placeholder="例如：
张三 2
李四 1"></textarea>

<h2>学生输入（换行分隔）</h2>
<textarea id="students" placeholder="例如：
张三
李四"></textarea>

<button onclick="assign()">开始随机分配</button>

<div class="result" id="output"></div>

<script>
function parseTeachers(text) {
    let lines = text.trim().split('\n');
    let teachers = {};
    lines.forEach(line => {
        let parts = line.trim().split(/\s+/);
        if (parts.length >= 2) {
            teachers[parts[0]] = parseInt(parts[1]);
        }
    });
    return teachers;
}

function parseStudents(text) {
    if (text.includes(',')) {
        return text.split(',').map(s => s.trim()).filter(s => s);
    }
    return text.split('\n').map(s => s.trim()).filter(s => s);
}

function assign() {
    let teachers = parseTeachers(document.getElementById("teachers").value);
    let students = parseStudents(document.getElementById("students").value);

    let assigned = {};
    Object.keys(teachers).forEach(t => assigned[t] = []);

    // 打乱
    students.sort(() => Math.random() - 0.5);

    students.forEach(s => {
        let available = Object.keys(teachers).filter(t => assigned[t].length < teachers[t]);
        if (available.length === 0) return;

        let t = available[Math.floor(Math.random() * available.length)];
        assigned[t].push(s);
    });

    let result = "";
    for (let t in assigned) {
        result += t + "：\n";
        result += assigned[t].join(", ") + "\n\n";
    }

    document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
